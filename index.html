<!DOCTYPE html>
<html>
<head>
<title>Kawaii's Adventure</title>
<style>
  body { 
    margin:0; 
    background:#87CEFA; 
  }
  canvas { 
    background:#87CEFA; 
    display:block; 
    margin:0 auto; 
  }
</style>
</head>
<body>
<canvas id="game" width="900" height="500"></canvas>

<script>
// --- SAFETY CHECK ---
window.onerror = function(msg) {
  document.body.innerHTML = "<h1 style='color:red;'>ERROR:</h1><p>" + msg + "</p>";
};

// --- SETUP ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- PLAYER ---
const player = {
  x: 100,
  y: 300,
  w: 80,
  h: 80,
  vx: 0,
  vy: 0,
  speed: 6,
  jumpPower: 15,
  onGround: false
};

// --- LEVEL ---
const platforms = [
  { x: 0, y: 450, w: 2000, h: 50, color: "brown" },
  { x: 300, y: 350, w: 200, h: 30, color: "brown" },
  { x: 700, y: 300, w: 200, h: 30, color: "brown" },

  // WHITE BOUNCY BLOCKS
  { x: 500, y: 420, w: 80, h: 30, color: "white" },
  { x: 850, y: 380, w: 80, h: 30, color: "white" },

  // NEW PLATFORM TO THE RIGHT (with a gap before it)
  { x: 1200, y: 420, w: 300, h: 30, color: "brown" }
];

// --- NEW SPIKES ---
const spikes = [
  { x: 1250, y: 390, w: 40, h: 30 },
  { x: 1300, y: 390, w: 40, h: 30 },
  { x: 1350, y: 390, w: 40, h: 30 }
];

// --- INPUT ---
const keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// --- RESET PLAYER ---
function resetPlayer() {
  player.x = 100;
  player.y = 300;
  player.vy = 0;
}

// --- GAME LOOP ---
function update() {
  // horizontal movement
  player.vx = 0;

  if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -player.speed;
  if (keys["ArrowRight"] || keys["KeyD"]) player.vx = player.speed;

  // jumping
  if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && player.onGround) {
    player.vy = -player.jumpPower;
    player.onGround = false;
  }

  // gravity
  player.vy += 0.5;

  // apply movement
  player.x += player.vx;
  player.y += player.vy;

  // --- PREVENT WALKING OUT OF SCREEN ---
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

  // --- FULL 4-WAY COLLISION + BOUNCE ---
  player.onGround = false;

  for (let p of platforms) {
    if (player.x < p.x + p.w &&
        player.x + player.w > p.x &&
        player.y < p.y + p.h &&
        player.y + player.h > p.y) {

      const prevX = player.x - player.vx;
      const prevY = player.y - player.vy;

      // LANDING ON TOP
      if (prevY + player.h <= p.y) {

        if (p.color === "white") {
          // BOUNCE!
          player.y = p.y - player.h;
          player.vy = -20;
        } else {
          // normal platform
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }

      // HITTING FROM BELOW
      else if (prevY >= p.y + p.h) {
        player.y = p.y + p.h;
        player.vy = 0;
      }

      // LEFT SIDE
      else if (prevX + player.w <= p.x) {
        player.x = p.x - player.w;
      }

      // RIGHT SIDE
      else if (prevX >= p.x + p.w) {
        player.x = p.x + p.w;
      }
    }
  }

  // --- SPIKE COLLISION (death/reset) ---
  for (let s of spikes) {
    if (player.x < s.x + s.w &&
        player.x + player.w > s.x &&
        player.y < s.y + s.h &&
        player.y + player.h > s.y) {
      resetPlayer();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // platforms
  for (let p of platforms) {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  // spikes
  ctx.fillStyle = "red";
  for (let s of spikes) {
    ctx.beginPath();
    ctx.moveTo(s.x, s.y + s.h);
    ctx.lineTo(s.x + s.w / 2, s.y);
    ctx.lineTo(s.x + s.w, s.y + s.h);
    ctx.fill();
  }

  // player
  ctx.fillStyle = "hotpink";
  ctx.fillRect(player.x, player.y, player.w, player.h);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
